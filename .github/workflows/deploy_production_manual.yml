name: deploy_production_manual
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true 
        default: ''
        type: string
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 'Checkout GitHub Action'
      uses: actions/checkout@v4
    - name: Get version from input
      run: echo "VERSION=${GITHUB_BRANCH}" >> $GITHUB_ENV
      env: 
        GITHUB_BRANCH: ${{ github.event.inputs.version }}
    - name: Display version install
      run: echo "Installing production version ${VERSION}"

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ vars.TOOLKIT_AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.TOOLKIT_AWS_ACCESS_SECRET }}
        aws-region: us-east-2

    - name: Deploy illinois-webchat to S3 bucket for version
      run: aws s3 sync ./src/ s3://cdn.toolkit.illinois.edu/content/illinois-webchat/$VERSION --delete --acl bucket-owner-full-control 
    - name: Deploy illinois-webchat to S3 bucket for latest
      run: aws s3 sync ./src/ s3://cdn.toolkit.illinois.edu/content/illinois-webchat/latest --delete --acl bucket-owner-full-control 
    - name: Invalidate illinois-webchat Cloudfront cache for version
      run: aws cloudfront create-invalidation --distribution-id ${{ vars.TOOLKIT_AWS_CLOUDFRONT }} --paths "/illinois-webchat/$VERSION*"
    - name: Invalidate illinois-webchat Cloudfront cache for latest
      run: aws cloudfront create-invalidation --distribution-id ${{ vars.TOOLKIT_AWS_CLOUDFRONT }} --paths "/illinois-webchat/latest*"
